<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BORNO - TikTok Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* تعريف الألوان والمتغيرات */
        :root {
            --bg-color: #ffffff;
            --text-color: #1c1c1e;
            --input-bg: #f2f2f7;
            --btn-blue: #3174ff;
            --btn-hover: #2659cc;
            --nav-inactive: #8e8e93;
            --nav-border: #f2f2f7;
            --card-shadow: rgba(0, 0, 0, 0.05);
        }

        /* تنسيقات الوضع الليلي Dark Mode */
        .dark-mode {
            --bg-color: #121212;
            --text-color: #ffffff;
            --input-bg: #1c1c1e;
            --btn-blue: #3a82ff;
            --nav-border: #2c2c2e;
            --card-shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background 0.4s ease, color 0.4s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* حاوية التطبيق الرئيسية */
        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px var(--card-shadow);
        }

        /* الهيدر العلوي */
        header {
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-bar-icons {
            display: flex;
            gap: 15px;
            font-size: 14px;
            color: var(--nav-inactive);
        }

        .theme-toggle {
            font-size: 22px;
            cursor: pointer;
            color: var(--nav-inactive);
            transition: transform 0.3s ease;
        }

        .theme-toggle:active {
            transform: rotate(45deg);
        }

        /* الصفحات */
        .page {
            flex: 1;
            padding: 20px 30px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: slideIn 0.3s ease-out;
        }

        .page.active {
            display: flex;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 35px;
            line-height: 1.4;
        }

        /* تصميم حقل الإدخال */
        .input-wrapper {
            width: 100%;
            margin-bottom: 25px;
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            background-color: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 18px;
            font-size: 16px;
            color: var(--text-color);
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            border-color: var(--btn-blue);
            background-color: var(--bg-color);
            box-shadow: 0 5px 15px rgba(49, 116, 255, 0.1);
        }

        .input-wrapper input::placeholder {
            color: var(--nav-inactive);
            opacity: 0.7;
        }

        /* أزرار الأكشن */
        .primary-btn {
            width: 100%;
            background-color: var(--btn-blue);
            color: #ffffff;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(49, 116, 255, 0.3);
        }

        .primary-btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 6px rgba(49, 116, 255, 0.2);
        }

        .primary-btn:disabled {
            background-color: var(--nav-inactive);
            cursor: not-allowed;
            transform: none;
        }

        /* كارت معاينة الفيديو */
        #previewCard {
            width: 100%;
            margin-top: 30px;
            background-color: var(--input-bg);
            border-radius: 20px;
            padding: 20px;
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }

        .thumb-img {
            width: 90px;
            height: 90px;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .video-info {
            font-size: 14px;
            margin-bottom: 15px;
            font-weight: 600;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .download-link-final {
            color: var(--btn-blue);
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            padding: 10px 20px;
            border: 2px solid var(--btn-blue);
            border-radius: 12px;
            transition: 0.3s;
        }

        .download-link-final:hover {
            background-color: var(--btn-blue);
            color: #fff;
        }

        /* شريط التنقل السفلي */
        .bottom-navbar {
            height: 85px;
            background-color: var(--bg-color);
            border-top: 1px solid var(--nav-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 15px;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--nav-inactive);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-item i {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .nav-item span {
            font-size: 12px;
            font-weight: 600;
        }

        .nav-item.active {
            color: var(--btn-blue);
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            top: -1px;
            width: 40px;
            height: 3px;
            background-color: var(--btn-blue);
            border-radius: 0 0 10px 10px;
        }

        /* لودر بسيط */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="light-mode">

    <div class="app-container">
        <header>
            <div class="theme-toggle" id="themeBtn">
                <i class="fas fa-moon"></i>
            </div>
            <div class="brand-name" style="font-weight: 800; letter-spacing: 1px; color: var(--btn-blue);">BORNO</div>
            <div class="status-bar-icons">
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-three-quarters"></i>
            </div>
        </header>

        <div id="home" class="page active">
            <h1>تنزيل فيديو من <br> <span style="color: var(--btn-blue);">TikTok</span></h1>
            
            <div class="input-wrapper">
                <input type="text" id="videoUrl" placeholder="ألحق رابط الفيديو هنا...">
            </div>

            <button class="primary-btn" id="dlBtn" onclick="processDownload()">
                <span id="btnText">تنزيل الفيديو</span>
            </button>

            <div id="previewCard">
                <img id="vThumb" class="thumb-img" src="" alt="Thumbnail">
                <p id="vTitle" class="video-info"></p>
                <a id="vDownload" href="" target="_blank" class="download-link-final">
                    <i class="fas fa-cloud-download-alt"></i> ابدأ التحميل الآن
                </a>
            </div>
        </div>

        <div id="history" class="page">
            <i class="fas fa-folder-open" style="font-size: 50px; color: var(--nav-inactive); margin-bottom: 20px;"></i>
            <h1>سجل التنزيلات</h1>
            <p style="color: var(--nav-inactive);">سيتم حفظ فيديوهاتك المحملة هنا قريباً.</p>
        </div>

        <nav class="bottom-navbar">
            <div class="nav-item active" onclick="switchTab('home', this)">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </div>
            <div class="nav-item" onclick="switchTab('history', this)">
                <i class="fas fa-arrow-circle-down"></i>
                <span>التنزيلات</span>
            </div>
        </nav>
    </div>

    <script>
        // 1. نظام التبديل بين الوضع الليلي والنهاري
        const themeBtn = document.getElementById('themeBtn');
        const icon = themeBtn.querySelector('i');
        
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            if(document.body.classList.contains('dark-mode')) {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        });

        // 2. التنقل بين الصفحات
        function switchTab(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            el.classList.add('active');
        }

        // 3. معالجة طلب التحميل الفعلي
        async function processDownload() {
            const urlInput = document.getElementById('videoUrl');
            const btn = document.getElementById('dlBtn');
            const btnText = document.getElementById('btnText');
            const card = document.getElementById('previewCard');
            const url = urlInput.value.trim();

            if(!url) {
                urlInput.style.borderColor = "red";
                setTimeout(() => urlInput.style.borderColor = "transparent", 2000);
                return;
            }

            // تحديث حالة الزر
            btn.disabled = true;
            btnText.innerHTML = 'جاري التحليل <span class="spinner"></span>';
            card.style.display = "none";

            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if(data.status === "success") {
                    document.getElementById('vThumb').src = data.thumbnail;
                    document.getElementById('vTitle').innerText = data.title;
                    document.getElementById('vDownload').href = data.download_link;
                    
                    card.style.display = "flex";
                    btnText.innerText = "تم استخراج الرابط!";
                } else {
                    alert("عذراً، لم نتمكن من العثور على الفيديو. تأكد من الرابط.");
                    btnText.innerText = "تنزيل الفيديو";
                }
            } catch (err) {
                alert("حدث خطأ في الاتصال بالسيرفر.");
                btnText.innerText = "تنزيل الفيديو";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
